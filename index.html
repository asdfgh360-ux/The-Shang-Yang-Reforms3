<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商鞅变法 - 历史策略游戏</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --background: #1a1a1a;
      --foreground: #e8e6e3;
      --card: #242424;
      --card-foreground: #e8e6e3;
      --primary: #c9a86c;
      --primary-foreground: #1a1a1a;
      --secondary: #2a2a2a;
      --secondary-foreground: #e8e6e3;
      --muted: #333333;
      --muted-foreground: #a0a0a0;
      --accent: #8b4513;
      --accent-foreground: #e8e6e3;
      --destructive: #dc2626;
      --destructive-foreground: #ffffff;
      --border: #3a3a3a;
      --input: #3a3a3a;
      --ring: #c9a86c;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      line-height: 1.6;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Noto Serif SC', serif;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(100px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201, 168, 108, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(201, 168, 108, 0); }
    }

    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .scale-in { animation: scaleIn 0.5s ease-out forwards; }
    .slide-up { animation: slideUp 0.5s ease-out forwards; }

    /* Intro Scene */
    .intro-scene {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      background: var(--background);
    }

    .intro-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a86c' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .intro-content {
      max-width: 700px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .intro-title {
      text-align: center;
      margin-bottom: 32px;
    }

    .intro-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(201, 168, 108, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .intro-icon svg {
      width: 36px;
      height: 36px;
      color: var(--primary);
    }

    .intro-title h1 {
      font-size: 3rem;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .intro-title p {
      font-size: 1.25rem;
      color: var(--muted-foreground);
    }

    .intro-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .intro-card p {
      margin-bottom: 16px;
      line-height: 1.8;
    }

    .intro-card p:last-child {
      margin-bottom: 0;
    }

    .highlight {
      color: var(--primary);
    }

    .intro-features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .feature-tag {
      padding: 8px 16px;
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.875rem;
      color: var(--muted-foreground);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px;
      font-size: 1.125rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--primary-foreground);
    }

    .btn-primary:hover {
      background: #d4b87a;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }

    .btn-outline:hover {
      background: rgba(201, 168, 108, 0.1);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Game Board */
    .game-board {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Metrics Bar */
    .metrics-bar {
      background: var(--background);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }

    .metrics-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .year-display {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .year-badge {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--primary-foreground);
    }

    .year-label {
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }

    .year-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      font-family: 'Noto Serif SC', serif;
    }

    .metrics-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .metric-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
    }

    .metric-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .metric-icon svg {
      width: 18px;
      height: 18px;
    }

    .metric-info {
      display: flex;
      flex-direction: column;
    }

    .metric-label {
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }

    .metric-value {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .metric-number {
      font-size: 1.25rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .metric-bar {
      width: 64px;
      height: 6px;
      background: var(--muted);
      border-radius: 3px;
      overflow: hidden;
    }

    .metric-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Section Header */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: rgba(201, 168, 108, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .section-icon svg {
      width: 16px;
      height: 16px;
      color: var(--primary);
    }

    .section-title h2 {
      font-size: 1.25rem;
      color: var(--foreground);
    }

    .section-count {
      font-size: 0.875rem;
      color: var(--muted-foreground);
    }

    /* Policy Cards */
    .policy-section {
      margin-bottom: 24px;
    }

    .policy-section-title {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .policy-section-title.available {
      color: var(--primary);
    }

    .policy-section-title.implemented {
      color: #22c55e;
    }

    .policy-section-title.locked {
      color: #666666;
    }

    .policy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .policy-card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .policy-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    }

    .policy-card.implemented {
      background: var(--secondary);
      border-color: #22c55e;
      opacity: 0.7;
      cursor: default;
    }

    .policy-card.implemented:hover {
      transform: none;
      box-shadow: none;
    }

    .policy-card.locked {
      background: var(--background);
      border-color: var(--secondary);
      opacity: 0.5;
      cursor: not-allowed;
    }

    .policy-card.locked:hover {
      transform: none;
      border-color: var(--secondary);
    }

    .policy-status {
      position: absolute;
      top: 12px;
      right: 12px;
    }

    .status-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-icon.implemented {
      background: #22c55e;
    }

    .status-icon.locked {
      color: #666666;
    }

    .status-icon.available {
      color: var(--primary);
    }

    .policy-content {
      padding-right: 32px;
    }

    .policy-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      font-family: 'Noto Serif SC', serif;
    }

    .policy-name.implemented {
      color: #22c55e;
    }

    .policy-name.default {
      color: var(--foreground);
    }

    .policy-description {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      margin-bottom: 12px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .policy-effects {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .effect-tag {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .effect-tag.positive {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .effect-tag.negative {
      background: rgba(220, 38, 38, 0.2);
      color: #dc2626;
    }

    .policy-year {
      font-size: 0.75rem;
      color: #666666;
    }

    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }

    .sidebar-card h3 {
      font-size: 1.125rem;
      margin-bottom: 16px;
      color: var(--foreground);
    }

    .sidebar-card p {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .btn-full {
      width: 100%;
    }

    /* History */
    .history-list {
      max-height: 256px;
      overflow-y: auto;
    }

    .history-item {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      padding-left: 12px;
      border-left: 2px solid var(--primary);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .history-item:last-child {
      margin-bottom: 0;
    }

    /* Tips */
    .tips-list {
      list-style: none;
    }

    .tips-list li {
      font-size: 0.75rem;
      color: #666666;
      margin-bottom: 8px;
    }

    .tips-list li:last-child {
      margin-bottom: 0;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 500px;
      width: 100%;
      padding: 24px;
      animation: scaleIn 0.3s ease;
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-title-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(201, 168, 108, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-title-icon svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }

    .modal-title h2 {
      font-size: 1.25rem;
      color: var(--foreground);
    }

    .modal-title span {
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted-foreground);
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--muted);
    }

    .modal-description {
      color: var(--foreground);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .modal-section {
      background: var(--background);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .modal-section h4 {
      font-size: 0.875rem;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .modal-section p {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      line-height: 1.5;
    }

    .modal-effects {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-actions .btn {
      flex: 1;
    }

    .warning-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .warning-box svg {
      width: 18px;
      height: 18px;
      color: var(--destructive);
      flex-shrink: 0;
    }

    .warning-box span {
      font-size: 0.875rem;
      color: var(--destructive);
    }

    /* Event Modal */
    .event-modal .modal-content {
      max-width: 600px;
      border-color: rgba(201, 168, 108, 0.5);
      animation: slideUp 0.4s ease;
    }

    .choices-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--foreground);
      cursor: pointer;
      transition: all 0.2s;
    }

    .choice-btn:hover {
      border-color: var(--primary);
      background: var(--secondary);
    }

    .choice-btn:hover .choice-text {
      color: var(--primary);
    }

    .choice-text {
      display: block;
      margin-bottom: 8px;
      transition: color 0.2s;
    }

    .choice-effects {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* Game Over */
    .game-over {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--background);
    }

    .game-over-content {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .grade-display {
      margin-bottom: 32px;
    }

    .grade-circle {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      animation: scaleIn 0.5s ease;
    }

    .grade-circle span {
      font-size: 4rem;
      font-weight: 700;
      color: var(--primary-foreground);
    }

    .grade-display h1 {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .grade-display p {
      color: var(--muted-foreground);
    }

    .result-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      animation: fadeIn 0.4s ease forwards;
    }

    .result-card:nth-child(1) { animation-delay: 0.2s; }
    .result-card:nth-child(2) { animation-delay: 0.4s; }

    .result-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .result-card-header svg {
      width: 18px;
      height: 18px;
      color: var(--primary);
    }

    .result-card-header h3 {
      font-size: 1rem;
      color: var(--foreground);
    }

    .result-card p {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      line-height: 1.6;
      padding-left: 30px;
    }

    .quote {
      font-size: 0.875rem;
      color: #666666;
      font-style: italic;
      margin-bottom: 32px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--background);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--muted);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4a4a4a;
    }

    /* Selection */
    ::selection {
      background: var(--primary);
      color: var(--primary-foreground);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useReducer, useCallback } = React;

    // Icons
    const Crown = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.957-.734L2.02 6.02a.5.5 0 0 1 .798-.519l4.276 3.664a1 1 0 0 0 1.516-.294z"/>
        <path d="M5 21h14"/>
      </svg>
    );

    const Heart = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
      </svg>
    );

    const Users = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    );

    const Sword = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

              {event.choices.map((choice, index) => (
                <button key={index} className="choice-btn" onClick={() => onChoice(index)}>
                  <span className="choice-text">{choice.text}</span>
                  <div className="choice-effects">
                    {Object.entries(choice.effects).map(([key, value]) => {
                      if (value === undefined) return null;
                      const label = { nationalPower: '国力', publicSupport: '民心', nobleSupport: '贵族', military: '军力' }[key];
                      const isPositive = value > 0;
                      return (
                        <span key={key} className={`effect-tag ${isPositive ? 'positive' : 'negative'}`}>
                          {label} {isPositive ? '+' : ''}{value}
                        </span>
                      );
                    })}
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    };

    const GameOver = ({ score, reason, onRestart }) => {
      const getGrade = (s) => {
        if (s >= 90) return { grade: 'S', title: '千古名相', description: '变法大成，秦国从此强盛，为日后统一六国奠定坚实基础。商鞅之名，流芳百世。' };
        if (s >= 75) return { grade: 'A', title: '变法功臣', description: '变法颇有成效，秦国国力大增，成为战国七雄中的强国。' };
        if (s >= 60) return { grade: 'B', title: '功过参半', description: '变法有一定成果，但阻力重重，未能完全实现强秦之志。' };
        return { grade: 'C', title: '变法失败', description: '变法未能成功，秦国继续积弱，最终被六国所灭。' };
      };

      const { grade, title, description } = getGrade(score);

      return (
        <div className="game-over">
          <div className="game-over-content">
            <div className="grade-display">
              <div className="grade-circle">
                <span>{grade}</span>
              </div>
              <h1>{title}</h1>
              <p>最终评分: {score}/100</p>
            </div>

            <div className="result-cards">
              <div className="result-card">
                <div className="result-card-header">
                  <Scroll />
                  <h3>变法结局</h3>
                </div>
                <p>{reason}</p>
              </div>

              <div className="result-card">
                <div className="result-card-header">
                  <Award />
                  <h3>历史评价</h3>
                </div>
                <p>{description}</p>
              </div>
            </div>

            <p className="quote">"治世不一道，便国不法古" —— 商鞅</p>

            <button className="btn btn-primary" onClick={onRestart}>
              <RotateCcw />
              重新开始
            </button>
          </div>
        </div>
      );
    };

    const GameBoard = ({ state, onNextYear, onSelectPolicy, onImplementPolicy, onHandleEventChoice }) => {
      const availablePolicies = state.policies.filter(p => p.available && !p.implemented);
      const implementedPolicies = state.policies.filter(p => p.implemented);
      const lockedPolicies = state.policies.filter(p => !p.available && !p.implemented);

      const handleEventChoice = (choiceIndex) => {
        if (state.currentEvent) {
          const choice = state.currentEvent.choices[choiceIndex];
          onHandleEventChoice(choice.effects, choice.consequence);
        }
      };

      return (
        <div className="game-board">
          <MetricsBar metrics={state.metrics} year={state.year} />

          <div className="main-content">
            <div className="content-grid">
              <div className="policies-section">
                <div className="section-header">
                  <div className="section-title">
                    <div className="section-icon">
                      <BookOpen />
                    </div>
                    <h2>变法政策</h2>
                  </div>
                  <span className="section-count">已推行: {implementedPolicies.length}/{state.policies.length}</span>
                </div>

                {availablePolicies.length > 0 && (
                  <div className="policy-section">
                    <h3 className="policy-section-title available">可推行政策</h3>
                    <div className="policy-grid">
                      {availablePolicies.map((policy, index) => (
                        <PolicyCard
                          key={policy.id}
                          policy={policy}
                          onClick={() => onSelectPolicy(policy)}
                          index={index}
                        />
                      ))}
                    </div>
                  </div>
                )}

                {implementedPolicies.length > 0 && (
                  <div className="policy-section">
                    <h3 className="policy-section-title implemented">已推行政策</h3>
                    <div className="policy-grid">
                      {implementedPolicies.map((policy, index) => (
                        <PolicyCard key={policy.id} policy={policy} onClick={() => {}} index={index} />
                      ))}
                    </div>
                  </div>
                )}

                {lockedPolicies.length > 0 && (
                  <div className="policy-section">
                    <h3 className="policy-section-title locked">未解锁政策</h3>
                    <div className="policy-grid">
                      {lockedPolicies.slice(0, 2).map((policy, index) => (
                        <PolicyCard key={policy.id} policy={policy} onClick={() => {}} index={index} />
                      ))}
                      {lockedPolicies.length > 2 && (
                        <div className="policy-card locked" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                          <span style={{ color: '#666666', fontSize: '0.875rem' }}>
                            还有 {lockedPolicies.length - 2} 项政策待解锁
                          </span>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>

              <div className="sidebar">
                <div className="sidebar-card">
                  <h3>朝政决策</h3>
                  <p>
                    当前是公元前{Math.abs(state.year)}年。
                    {state.year > 350 ? '变法正在进行中，请继续推行政策。' : '第二次变法即将开始。'}
                  </p>
                  <button
                    className="btn btn-primary btn-full"
                    onClick={onNextYear}
                    disabled={state.currentEvent !== null}
                  >
                    进入下一年
                    <ChevronRight />
                  </button>
                </div>

                {state.eventHistory.length > 0 && (
                  <div className="sidebar-card">
                    <div className="section-title" style={{ marginBottom: '16px' }}>
                      <div className="section-icon">
                        <History />
                      </div>
                      <h3>历史记录</h3>
                    </div>
                    <div className="history-list">
                      {state.eventHistory.map((event, index) => (
                        <div key={index} className="history-item">{event}</div>
                      ))}
                    </div>
                  </div>
                )}

                <div className="sidebar-card" style={{ background: '#1a1a1a', borderColor: '#2a2a2a' }}>
                  <h4 style={{ fontSize: '0.875rem', color: '#666666', marginBottom: '12px' }}>游戏提示</h4>
                  <ul className="tips-list">
                    <li>• 民心过低会导致百姓起义</li>
                    <li>• 贵族支持度过低会遭遇政变</li>
                    <li>• 平衡各方势力是变法成功的关键</li>
                    <li>• 不同政策会解锁新的改革措施</li>
                  </ul>
                </div>
              </div>
            </div>
          </div>

          <PolicyModal
            policy={state.selectedPolicy}
            currentMetrics={state.metrics}
            onClose={() => onSelectPolicy(null)}
            onImplement={() => {
              if (state.selectedPolicy) {
                onImplementPolicy(state.selectedPolicy);
              }
            }}
          />

          <EventModal
            event={state.currentEvent}
            onChoice={handleEventChoice}
          />
        </div>
      );
    };

    // Main App
    const App = () => {
      const [state, setState] = useState(createInitialState());

      const startGame = () => {
        setState({ ...createInitialState(), phase: 'playing' });
      };

      const nextYear = () => {
        setState(prev => {
          const newYear = prev.year - 1;

          const updatedPolicies = prev.policies.map(p => {
            if (p.year === newYear && !p.implemented) {
              return { ...p, available: true };
            }
            return p;
          });

          const allImplemented = updatedPolicies.every(p => p.implemented);
          const shouldTriggerEvent = Math.random() > 0.3;

          if (newYear < END_YEAR || allImplemented) {
            const finalScore = calculateScore(prev.metrics, updatedPolicies);
            return {
              ...prev,
              phase: 'ended',
              finalScore,
              gameOverReason: allImplemented
                ? '变法大成！秦国从此强盛，为日后统一六国奠定基础。'
                : '时间已到，变法虽未完全，但秦国已见起色。',
            };
          }

          if (shouldTriggerEvent) {
            return {
              ...prev,
              year: newYear,
              policies: updatedPolicies,
              phase: 'event',
              currentEvent: getRandomEvent(),
            };
          }

          return {
            ...prev,
            year: newYear,
            policies: updatedPolicies,
          };
        });
      };

      const implementPolicy = (policy) => {
        setState(prev => {
          const hasEnoughResources = Object.entries(policy.costs).every(
            ([key, value]) => prev.metrics[key] + (value || 0) >= 0
          );

          if (!hasEnoughResources) return prev;

          const updatedMetrics = { ...prev.metrics };

          Object.entries(policy.costs).forEach(([key, value]) => {
            if (value) {
              updatedMetrics[key] = Math.max(0, Math.min(100, updatedMetrics[key] + value));
            }
          });

          Object.entries(policy.effects).forEach(([key, value]) => {
            if (value) {
              updatedMetrics[key] = Math.max(0, Math.min(100, updatedMetrics[key] + value));
            }
          });

          const updatedPolicies = prev.policies.map(p => {
            if (p.id === policy.id) {
              return { ...p, implemented: true, available: false };
            }
            if (p.id === 'reward-military' && policy.id === 'move-wood') return { ...p, available: true };
            if (p.id === 'collective-responsibility' && policy.id === 'move-wood') return { ...p, available: true };
            if (p.id === 'agriculture-first' && policy.id === 'move-wood') return { ...p, available: true };
            return p;
          });

          const gameOver = checkGameOver(updatedMetrics);
          if (gameOver.isOver) {
            return {
              ...prev,
              metrics: updatedMetrics,
              policies: updatedPolicies,
              phase: 'ended',
              finalScore: calculateScore(updatedMetrics, updatedPolicies),
              gameOverReason: gameOver.reason,
            };
          }

          return {
            ...prev,
            metrics: updatedMetrics,
            policies: updatedPolicies,
            selectedPolicy: null,
          };
        });
      };

      const handleEventChoice = (effects, consequence) => {
        setState(prev => {
          const updatedMetrics = { ...prev.metrics };

          Object.entries(effects).forEach(([key, value]) => {
            if (value !== undefined) {
              updatedMetrics[key] = Math.max(0, Math.min(100, updatedMetrics[key] + value));
            }
          });

          const gameOver = checkGameOver(updatedMetrics);

          if (gameOver.isOver) {
            return {
              ...prev,
              metrics: updatedMetrics,
              eventHistory: [...prev.eventHistory, consequence],
              phase: 'ended',
              finalScore: calculateScore(updatedMetrics, prev.policies),
              gameOverReason: gameOver.reason,
            };
          }

          return {
            ...prev,
            metrics: updatedMetrics,
            eventHistory: [...prev.eventHistory, consequence],
            currentEvent: null,
            phase: 'playing',
          };
        });
      };

      const selectPolicy = (policy) => {
        setState(prev => ({
          ...prev,
          selectedPolicy: policy,
          phase: policy ? 'policy' : 'playing',
        }));
      };

      const restartGame = () => {
        setState(createInitialState());
      };

      return (
        <>
          {state.phase === 'intro' && <IntroScene onStart={startGame} />}
          {(state.phase === 'playing' || state.phase === 'event' || state.phase === 'policy') && (
            <GameBoard
              state={state}
              onNextYear={nextYear}
              onSelectPolicy={selectPolicy}
              onImplementPolicy={implementPolicy}
              onHandleEventChoice={handleEventChoice}
            />
          )}
          {state.phase === 'ended' && (
            <GameOver
              score={state.finalScore}
              reason={state.gameOverReason}
              onRestart={restartGame}
            />
          )}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
